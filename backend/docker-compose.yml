version: "3.8"

services:
  # ----------------------------------------------------------------
  # BANCO DE DADOS CRM (com pgvector para RAG)
  # ----------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: '128mb'
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1280M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------------------------------
  # BANCO DE DADOS EVOLUTION API
  # ----------------------------------------------------------------
  postgresql-evo:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVO_PG_USER:-evolution_user}
      POSTGRES_PASSWORD: ${EVO_PG_PASS:-evolution_password}
      POSTGRES_DB: ${EVO_PG_DB:-evolution_db}
    volumes:
      - postgres_evo_data:/var/lib/postgresql/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution_user -d evolution_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # ----------------------------------------------------------------
  # REDIS (Compartilhado)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # maxmemory evita crescimento ilimitado; lru descarta chaves menos usadas
    command: redis-server --appendonly yes --maxmemory 220mb --maxmemory-policy allkeys-lru
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  # ----------------------------------------------------------------
  # SUA API (BACKEND)
  # ----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    ports:
      - "3051:3051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      PORT: 3051
      # Limita heap do Node.js — o container reinicia antes do OOM kill do kernel
      NODE_OPTIONS: --max-old-space-size=1024
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-crm}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      WEBHOOK_URL: http://api:3051
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------------------------------
  # EVOLUTION API
  # ----------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: evolution_api
    restart: always
    ports:
      - "8089:8080"
    volumes:
      - evolution_instancesv2:/evolution/instances
    depends_on:
      postgresql-evo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    environment:
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1030000000
      - NODE_OPTIONS=--dns-result-order=ipv4first --max-old-space-size=1280
      - DEL_INSTANCE=false
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVO_PG_USER:-evolution_user}:${EVO_PG_PASS:-evolution_password}@postgresql-evo:5432/${EVO_PG_DB:-evolution_db}
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_PUBLIC_URL:-http://evolution-api:8080}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-crm-api-key-secure-2024}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - WEBHOOK_GLOBAL_ENABLED=false
      - LOG_LEVEL=ERROR,WARN
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
  postgres_evo_data:
  redis_data:
  evolution_instancesv2:

networks:
  crm_network:
    driver: bridge
